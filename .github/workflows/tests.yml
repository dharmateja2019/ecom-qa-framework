name: E-Commerce QA Framework

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  BASE_URL: https://dummyjson.com

jobs:
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # 🚀 Cache dependencies (speed boost)
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      # 🚀 Run smoke tests with parallel + retry
      - name: Run smoke tests
        run: |
          pytest tests/ -v -m "smoke and not ai" -n auto --alluredir=allure-results --reruns 2 --reruns-delay 1

      # 📊 Upload Allure results
      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-smoke
          path: allure-results

  regression-tests:
    name: Regression Tests
    runs-on: ubuntu-latest
    needs: smoke-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      # 🚀 Regression with parallel + retry
      - name: Run regression tests
        run: |
          pytest tests/ -v -m -m "regression and not ai" -n auto --alluredir=allure-results --reruns 2 --reruns-delay 1

      # 📊 Upload Allure results
      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-regression
          path: allure-results
