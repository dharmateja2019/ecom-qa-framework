name: Container CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  docker-test:
    name: Docker ${{ matrix.suite }} Tests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        suite: [api, ui, db, smoke, regression]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t qa-tests:latest .

      - name: Create Allure Results Folder
        run: mkdir -p allure-results-${{ matrix.suite }}

      - name: Run Selected Test Suite
        run: |
          if [ "${{ matrix.suite }}" = "api" ]; then
            docker run --rm \
              -v ${{ github.workspace }}/allure-results-api:/app/allure-results \
              qa-tests:latest \
              pytest tests/api -n auto --alluredir=allure-results --reruns 2 --reruns-delay 1

          elif [ "${{ matrix.suite }}" = "ui" ]; then
            docker run --rm \
              -v ${{ github.workspace }}/allure-results-ui:/app/allure-results \
              qa-tests:latest \
              pytest tests/ui -n auto --alluredir=allure-results --reruns 2 --reruns-delay 1

          elif [ "${{ matrix.suite }}" = "db" ]; then
            docker run --rm \
              -v ${{ github.workspace }}/allure-results-db:/app/allure-results \
              qa-tests:latest \
              pytest tests/db -n auto --alluredir=allure-results --reruns 2 --reruns-delay 1

          elif [ "${{ matrix.suite }}" = "smoke" ]; then
            docker run --rm \
              -v ${{ github.workspace }}/allure-results-smoke:/app/allure-results \
              qa-tests:latest \
              pytest tests/ -m smoke -n auto --alluredir=allure-results --reruns 2 --reruns-delay 1

          else
            docker run --rm \
              -v ${{ github.workspace }}/allure-results-regression:/app/allure-results \
              qa-tests:latest \
              pytest tests/ -m regression -n auto --alluredir=allure-results --reruns 2 --reruns-delay 1
          fi

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.suite }}
          path: allure-results-${{ matrix.suite }}

  compose-test:
    name: Docker Compose Test
    runs-on: ubuntu-latest
    needs: docker-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run with Docker Compose
        run: docker compose up --build --abort-on-container-exit

      - name: Cleanup
        if: always()
        run: docker compose down -v
