name: Container CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  docker-test:
    name: Docker Image Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t qa-tests:latest .

      - name: Run API tests in container
        run: docker run qa-tests:latest pytest tests/api -v -s

  compose-test:
    name: Docker Compose Test
    runs-on: ubuntu-latest
    needs: docker-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run with Docker Compose
        run: docker compose up --build --abort-on-container-exit

      - name: Cleanup
        if: always()
        run: docker compose down -v
