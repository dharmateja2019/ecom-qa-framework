[pytest]

addopts = 
    -n 2
    -v
    -s 
    --alluredir=allure-results 
    --reruns 2 
    --reruns-delay 1
    --cov=tests
    --cov-report=term-missing
    --cov-report=xml
    --cov-report=html
    --junitxml=test-results.xml
testpaths = tests
markers =
    smoke: critical path tests
    regression: full suite
    ai: requires local Ollama instance